<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Yes or No</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
    }

    .card {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 280px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .yes {
      background: #4CAF50;
      color: white;
    }

    .no {
      background: #f44336;
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Mau lanjut ke halaman berikutnya?</h1>

    <a class="btn yes" href="content://media/external/file/1000702700">YES</a>
    <a class="btn no" href="content://media/external/file/1000702700">NO</a>
  </div>

</body>
</html>
